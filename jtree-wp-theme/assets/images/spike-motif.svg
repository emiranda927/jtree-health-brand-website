<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <!-- JTree spike motif pattern tile - inspired by Joshua Tree spines -->
  <g opacity="0.12" stroke="#1E3D34" stroke-width="1.5" stroke-linecap="round">
    <!-- Central spike cluster -->
    <line x1="60" y1="60" x2="60" y2="20"/>
    <line x1="60" y1="60" x2="80" y2="28"/>
    <line x1="60" y1="60" x2="40" y2="28"/>
    <line x1="60" y1="60" x2="90" y2="45"/>
    <line x1="60" y1="60" x2="30" y2="45"/>
    <!-- Lower spikes -->
    <line x1="60" y1="60" x2="60" y2="100"/>
    <line x1="60" y1="60" x2="80" y2="92"/>
    <line x1="60" y1="60" x2="40" y2="92"/>
    <line x1="60" y1="60" x2="90" y2="75"/>
    <line x1="60" y1="60" x2="30" y2="75"/>
    <!-- Side spikes -->
    <line x1="60" y1="60" x2="100" y2="60"/>
    <line x1="60" y1="60" x2="20" y2="60"/>
    <!-- Diagonal accents -->
    <line x1="60" y1="60" x2="95" y2="25"/>
    <line x1="60" y1="60" x2="25" y2="25"/>
    <line x1="60" y1="60" x2="95" y2="95"/>
    <line x1="60" y1="60" x2="25" y2="95"/>
  </g>
</svg>
