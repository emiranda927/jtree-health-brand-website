                type: string
                required: true
              - name: title
                label: Heading
                type: string
                required: true
              - name: intro
                label: Introduction
                type: text
                required: true
              - name: points
                label: Progress points
                component: text_pair
                list:
                  min: 3
                  max: 3
                  collapsible:
                    collapsed: true
                    summary: "{title}"
              - name: cta
                label: Link label
                type: string
                required: true
          - name: process
