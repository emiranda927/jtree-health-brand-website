media:
  input: public/uploads
  output: /uploads
  categories: [image]
  extensions: [png, jpg, jpeg, webp, svg]
  rename: safe

settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      update: "content: update {path} via Pages CMS"

components:
  seo:
    type: object
    label: Search and sharing
    description: Keep titles specific and descriptions useful. Canonicals, robots rules, and structured data remain managed in code.
    fields:
      - name: title
        label: Page title
        type: string
        required: true
        options:
          minlength: 20
          maxlength: 70
      - name: description
        label: Search description
        type: text
        required: true
        options:
          minlength: 50
          maxlength: 170

  text_pair:
    type: object
    fields:
      - name: title
        label: Heading
        type: string
        required: true
      - name: body
        label: Supporting copy
        type: text
        required: true

  team_member:
    type: object
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: credentials
        label: Credentials or role
        type: string
        required: true
        description: Publish licenses and credentials only after the person has confirmed them.
      - name: title
        label: Program title
        type: string
        required: true

content:
  - name: pilot_pages
    label: Website copy pilot
    type: group
    items:
      - name: home
        label: Homepage
        type: file
        path: src/content/pages/home.json
        format: json
        operations:
          create: false
          rename: false
          delete: false
        fields:
          - name: seo
            component: seo
          - name: hero
            label: Opening section
            type: object
            fields:
              - name: lineOne
                label: Headline line 1
                type: string
                required: true
              - name: lineTwo
                label: Headline line 2
                type: string
                required: true
              - name: lineThree
                label: Headline line 3
                type: string
                required: true
              - name: ledeOne
                label: Introduction line 1
                type: text
                required: true
              - name: ledeTwo
                label: Introduction line 2
                type: text
                required: true
              - name: primaryCta
                label: Primary button label
                type: string
                required: true
              - name: secondaryCta
                label: Secondary button label
                type: string
                required: true
          - name: trustFacts
            label: Verified program facts
            type: string
            list:
              min: 4
              max: 4
            readonly: true
            description: These are locked in the editor because changes require operational verification.
          - name: manifesto
            label: Why structured care
            type: object
            fields:
