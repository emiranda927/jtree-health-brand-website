                    label: Program name
                    type: string
                    required: true
                  - name: title
                    label: Heading
                    type: string
                    required: true
                  - name: schedule
                    label: Schedule summary
                    type: string
                    required: true
                  - name: body
                    label: Description
                    type: text
                    required: true
                  - name: features
                    label: Included services
                    type: string
                    required: true
                    list:
                      min: 1
                      max: 8
                  - name: cta
                    label: Link label
                    type: string
                    required: true
              - name: iop
                label: IOP card
                type: object
                fields:
